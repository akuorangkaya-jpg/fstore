<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fstore - Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav>
    <div class="container">
      <a href="home.html" class="logo">
        <img src="logo-fstore.png" alt="Logo Fstore" class="logo-img">
      </a>
      <ul class="nav-links">
        <li><a href="home.html">Home</a></li>
        <li><a href="index.html" class="active">Dashboard</a></li>
        <li><a href="transaksi.html">Transaksi</a></li>
        <li><a href="panduan.html">Panduan</a></li>
      </ul>
    </div>
    <div class="header-wave"></div>
  </nav>

  <div class="container">
    <div class="last-updated-wrapper">
      <div class="last-updated" id="lastUpdated"></div>
    </div>

    <div class="summary-cards" id="summaryCards">
      <div class="loading">Memuat data...</div>
    </div>

    <div class="chart-container" id="chartContainer" style="display: none;">
      <h2 class="section-title">Aliran Kas Bulanan</h2>
      <canvas id="cashflowChart"></canvas>
    </div>

    <div class="table-container" id="recentTransactionsContainer" style="display: none;">
      <h2 class="section-title" style="padding: 1.5rem 1.5rem 0;">Transaksi Terbaru</h2>
      <table id="recentTransactionsTable">
        <thead>
          <tr>
            <th>Tanggal</th>
            <th>Kategori</th>
            <th>Deskripsi</th>
            <th>Pendapatan</th>
            <th>Pengeluaran</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

 <footer>
  <p>Made with ♥, Fstore Kabinet Astravia 2026</p>
</footer>

  <script src="config.js"></script>
  <script src="data.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="dashboard.js"></script>
  <script src="auth.js"></script>
</body>
</html>
