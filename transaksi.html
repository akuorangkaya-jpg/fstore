<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fstore - Transaksi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav>
    <div class="container">
      <h1>Fstore</h1>
      <ul>
        <li><a href="index.html">Dashboard</a></li>
        <li><a href="transaksi.html" class="active">Transaksi</a></li>
        <li><a href="panduan.html">Panduan</a></li>
      </ul>
    </div>
  </nav>

  <div class="container">
    <div class="last-updated" id="lastUpdated"></div>

    <div class="filters">
      <input type="text" id="searchInput" placeholder="Cari deskripsi...">
      <select id="categoryFilter">
        <option value="">Semua Kategori</option>
        <option value="Pendapatan">Pendapatan</option>
        <option value="Pengeluaran">Pengeluaran</option>
      </select>
      <input type="month" id="monthFilter">
      <input type="date" id="startDateFilter" placeholder="Tanggal Mulai">
      <input type="date" id="endDateFilter" placeholder="Tanggal Akhir">
    </div>

    <div class="table-container" id="transactionsContainer">
      <div class="loading">Memuat data...</div>
    </div>
  </div>

  <footer>
    <p>&copy; 2025 Fstore. Semua hak cipta dilindungi.</p>
  </footer>

  <script src="config.js"></script>
